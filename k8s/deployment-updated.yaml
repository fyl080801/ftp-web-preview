apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftp-web-preview
  namespace: dev
  labels:
    app: ftp-web-preview
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftp-web-preview
  template:
    metadata:
      labels:
        app: ftp-web-preview
    spec:
      containers:
      - name: app
        image: 192.168.68.95:31443/ai-apps/ftp-web-preview:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: FTP_HOST
          value: "192.168.68.246"
        - name: FTP_PORT
          value: "990"
        - name: FTP_USER
          valueFrom:
            secretKeyRef:
              name: ftp-web-preview-secret
              key: ftp-user
        - name: FTP_PASS
          valueFrom:
            secretKeyRef:
              name: ftp-web-preview-secret
              key: ftp-pass
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ftp-web-preview
  namespace: dev
  labels:
    app: ftp-web-preview
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  selector:
    app: ftp-web-preview
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ftp-web-preview
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
  - host: 3dftp.fyl080801.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ftp-web-preview
            port:
              number: 5000
