apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ftp-web-preview-cicd
  namespace: dev
spec:
  arguments:
    parameters:
    - name: generateName
      value: ftp-web-preview-cicd-
    - name: gitRepo
      value: git@github.com:fyl080801/ftp-web-preview.git
    - name: gitRevision
      value: master
    - name: imageName
      value: 192.168.68.95:31443/ai-apps/ftp-web-preview
    - name: harborAuthSecret
      value: harbor-auth
    - name: harborCaSecret
      value: harbor-ca-cert
    - name: k8sNamespace
      value: dev
    - name: deploymentName
      value: ftp-web-preview
  entrypoint: main
  templates:
  - name: main
    steps:
    - - name: clone
        template: git-clone
    - - name: build-and-push
        template: buildah-build-push
        arguments:
          artifacts:
          - name: source
            from: '{{steps.clone.outputs.artifacts.source}}'
          parameters:
          - name: imageTag
            value: '{{steps.clone.outputs.parameters.commit-short}}'
    - - name: update-deployment
        template: k8s-update-deployment
        arguments:
          parameters:
          - name: imageTag
            value: '{{steps.clone.outputs.parameters.commit-short}}'

  - name: git-clone
    container:
      image: 192.168.68.95:31443/docker.io/alpine/git:latest
      command: [sh, -c]
      args:
      - |
        set -e
        # 设置 SSH
        mkdir -p /root/.ssh
        cp /ssh-key/id_ed25519 /root/.ssh/
        chmod 600 /root/.ssh/id_ed25519
        cp /ssh-key/known_hosts /root/.ssh/known_hosts 2>/dev/null || true
        
        # 配置 SSH 使用代理
        cat > /root/.ssh/config << 'EOF'
        Host github.com
          HostName github.com
          User git
          IdentityFile /root/.ssh/id_ed25519
          StrictHostKeyChecking accept-new
          ProxyCommand nc -X 5 -x 10.43.0.1:1080 %h %p
        EOF
        chmod 600 /root/.ssh/config
        
        REVISION="{{workflow.parameters.gitRevision}}"
        echo "Cloning {{workflow.parameters.gitRepo}} ..."
        git clone {{workflow.parameters.gitRepo}} /workspace
        cd /workspace
        echo "Checking out $REVISION ..."
        git checkout $REVISION
        echo "Successfully checked out to $REVISION"
        echo "Current commit:"
        git log -1 --oneline
        COMMIT_FULL=$(git rev-parse HEAD)
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        echo "Commit short: $COMMIT_SHORT"
        echo -n "$COMMIT_FULL" > /tmp/git-commit-full
        echo -n "$COMMIT_SHORT" > /tmp/git-commit-short
      envFrom:
      - configMapRef:
          name: workflow-proxy-config
          optional: true
      volumeMounts:
      - name: ssh-key
        mountPath: /ssh-key
        readOnly: true
    volumes:
    - name: ssh-key
      secret:
        secretName: github-deploy-key
    outputs:
      artifacts:
      - name: source
        path: /workspace
      parameters:
      - name: commit-full
        valueFrom:
          path: /tmp/git-commit-full
      - name: commit-short
        valueFrom:
          path: /tmp/git-commit-short

  - name: buildah-build-push
    container:
      image: quay.io/buildah/stable:latest
      command: [sh, -c]
      args:
      - |
        set -e
        echo "Installing qemu-user-static for multi-arch builds..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache qemu-user-static
        fi
        
        echo ""
        echo "Building multi-arch image with Buildah..."
        INTERNAL_IMAGE=$(echo {{workflow.parameters.imageName}}:{{inputs.parameters.imageTag}} | sed 's|192.168.68.95:31443|harbor-core.harbor.svc|')
        INTERNAL_REGISTRY=$(echo ${INTERNAL_IMAGE} | cut -d/ -f1)
        EXTERNAL_IMAGE={{workflow.parameters.imageName}}:{{inputs.parameters.imageTag}}
        
        echo "Creating manifest for multi-arch image..."
        buildah manifest create ${INTERNAL_IMAGE}
        
        echo "Building for linux/amd64..."
        buildah bud --platform linux/amd64 --format docker --file /workspace/Dockerfile --manifest ${INTERNAL_IMAGE} /workspace
        
        echo "Building for linux/arm64..."
        buildah bud --platform linux/arm64 --format docker --file /workspace/Dockerfile --manifest ${INTERNAL_IMAGE} /workspace
        
        echo "Logging in to Harbor internal service..."
        echo "${PASS}" | buildah login --username="${USER}" --password-stdin ${INTERNAL_REGISTRY} || true
        
        echo "Pushing multi-arch manifest to Harbor..."
        buildah manifest push --all ${INTERNAL_IMAGE} docker://${INTERNAL_IMAGE}
        
        echo "Logging out..."
        buildah logout ${INTERNAL_REGISTRY} || true
        
        echo "Multi-arch build completed"
        echo "External image: ${EXTERNAL_IMAGE}"
        echo "Internal image: ${INTERNAL_IMAGE}"
      env:
      - name: USER
        valueFrom:
          secretKeyRef:
            key: username
            name: '{{workflow.parameters.harborAuthSecret}}'
      - name: PASS
        valueFrom:
          secretKeyRef:
            key: password
            name: '{{workflow.parameters.harborAuthSecret}}'
      envFrom:
      - configMapRef:
          name: workflow-proxy-config
          optional: true
      securityContext:
        privileged: true
        runAsUser: 0
      volumeMounts:
      - mountPath: /etc/pki/tls/certs/harbor.crt
        name: harbor-ca
        readOnly: true
        subPath: ca.crt
      - mountPath: /etc/pki/ca-trust/source/anchors/harbor.crt
        name: harbor-ca
        readOnly: true
        subPath: ca.crt
      workingDir: /workspace
    inputs:
      artifacts:
      - name: source
        path: /workspace
      parameters:
      - name: imageTag
    volumes:
    - name: harbor-ca
      secret:
        secretName: '{{workflow.parameters.harborCaSecret}}'

  - name: k8s-update-deployment
    container:
      image: bitnami/kubectl:latest
      command: [sh, -c]
      args:
      - |
        set -e
        echo "Updating deployment {{workflow.parameters.deploymentName}} in namespace {{workflow.parameters.k8sNamespace}}"
        NEW_IMAGE="{{workflow.parameters.imageName}}:{{inputs.parameters.imageTag}}"
        echo "New image: ${NEW_IMAGE}"
        kubectl set image deployment/{{workflow.parameters.deploymentName}} app=${NEW_IMAGE} -n {{workflow.parameters.k8sNamespace}} --record
        echo "Waiting for rollout..."
        kubectl rollout status deployment/{{workflow.parameters.deploymentName}} -n {{workflow.parameters.k8sNamespace}} --timeout=300s
        echo "Deployment updated successfully!"
      env:
      - name: KUBECONFIG
        value: /.kube/config
      volumeMounts:
      - mountPath: /.kube
        name: kubeconfig
    inputs:
      parameters:
      - name: imageTag
    volumes:
    - name: kubeconfig
      secret:
        secretName: argo-kubeconfig
---
# Workflow 触发器 - 立即执行
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ftp-web-preview-cicd-
  namespace: dev
spec:
  workflowTemplateRef:
    name: ftp-web-preview-cicd
  arguments:
    parameters:
    - name: gitRevision
      value: master
